---
- name: Set gost architecture
  ansible.builtin.set_fact:
    gost_arch: "{{ singbox_arch_map[ansible_facts['architecture']] | default('amd64') }}"

- name: Check installed gost version
  ansible.builtin.command: /usr/local/bin/gost -V
  register: gost_installed
  changed_when: false
  failed_when: false

- name: Install gost {{ gost_version }}
  when: gost_installed.rc != 0 or gost_version not in gost_installed.stdout
  block:
    - name: Download gost {{ gost_version }}
      ansible.builtin.get_url:
        url: "https://github.com/ginuerzh/gost/releases/download/v{{ gost_version }}/gost-linux-{{ gost_arch }}-{{ gost_version }}.gz"
        dest: "/tmp/gost-{{ gost_version }}.gz"
        mode: "0644"

    - name: Decompress gost binary
      ansible.builtin.shell: gunzip -c "/tmp/gost-{{ gost_version }}.gz" > /usr/local/bin/gost
      notify: Restart gost-tgproxy

    - name: Set gost binary permissions
      ansible.builtin.file:
        path: /usr/local/bin/gost
        mode: "0755"
        owner: root
        group: root

- name: Deploy gost-tgproxy systemd service
  ansible.builtin.template:
    src: gost-tgproxy.service.j2
    dest: /etc/systemd/system/gost-tgproxy.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart gost-tgproxy

- name: Enable and start gost-tgproxy
  ansible.builtin.systemd:
    name: gost-tgproxy
    enabled: true
    state: started
    daemon_reload: true

- name: Create ACME webroot directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - /var/www/letsencrypt
    - /var/www/letsencrypt/.well-known
    - /var/www/letsencrypt/.well-known/acme-challenge

- name: Deploy nginx HTTP vhost for ACME challenge
  ansible.builtin.template:
    src: nginx-tgproxy-acme.conf.j2
    dest: "/etc/nginx/sites-available/{{ tgproxy_domain }}-acme"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx ACME vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ tgproxy_domain }}-acme"
    dest: "/etc/nginx/sites-enabled/{{ tgproxy_domain }}-acme"
    state: link
  notify: Reload nginx

- name: Flush handlers before certbot
  ansible.builtin.meta: flush_handlers

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    state: started

- name: Obtain Let's Encrypt certificate for {{ tgproxy_domain }}
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --non-interactive
      --agree-tos
      --email {{ tgproxy_acme_email }}
      --webroot -w /var/www/letsencrypt
      -d {{ tgproxy_domain }}
      --deploy-hook "systemctl reload nginx"
  args:
    creates: "/etc/letsencrypt/live/{{ tgproxy_domain }}/fullchain.pem"

- name: Deploy nginx HTTPS reverse proxy vhost
  ansible.builtin.template:
    src: nginx-tgproxy.conf.j2
    dest: "/etc/nginx/sites-available/{{ tgproxy_domain }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx reverse proxy vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ tgproxy_domain }}"
    dest: "/etc/nginx/sites-enabled/{{ tgproxy_domain }}"
    state: link
  notify: Reload nginx

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
