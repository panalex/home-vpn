---
- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nftables

- name: Ensure nftables is enabled and started
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
