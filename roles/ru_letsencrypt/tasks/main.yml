---
- name: Install certbot
  ansible.builtin.apt:
    name:
      - certbot
    state: present
    update_cache: true

- name: Create ACME webroot directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - /var/www/letsencrypt
    - /var/www/letsencrypt/.well-known
    - /var/www/letsencrypt/.well-known/acme-challenge

- name: Create ACME test file
  ansible.builtin.copy:
    dest: /var/www/letsencrypt/.well-known/acme-challenge/health
    content: "ok\n"
    owner: www-data
    group: www-data
    mode: "0644"

- name: Deploy nginx HTTP vhost for ACME
  ansible.builtin.template:
    src: nginx-acme.conf.j2
    dest: "/etc/nginx/sites-available/{{ domain }}-acme"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx HTTP vhost for ACME
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ domain }}-acme"
    dest: "/etc/nginx/sites-enabled/{{ domain }}-acme"
    state: link
  notify: Reload nginx

# - name: Validate nginx config
#   ansible.builtin.command: nginx -t
#   changed_when: false

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Obtain or renew Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --non-interactive
      --agree-tos
      --email {{ email }}
      --webroot -w /var/www/letsencrypt
      -d {{ domain }}
      --deploy-hook "systemctl reload nginx"
  args:
    creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"