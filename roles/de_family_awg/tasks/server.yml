---
# Server identity + shared ASC params. Generated once, persisted to the control
# node (gitignored), reused forever after — full idempotency.
# _awg_secrets_stat is registered by tasks/main.yml before this file is imported.

- name: Generate server identity + shared ASC (first run only)
  when: not _awg_secrets_stat.stat.exists
  run_once: true
  block:
    - name: Generate server private key (awg genkey)
      ansible.builtin.command: awg genkey
      changed_when: true
      register: _awg_priv

    - name: Derive server public key (awg pubkey)
      ansible.builtin.shell:
        cmd: "set -o pipefail; printf '%s' '{{ _awg_priv.stdout }}' | awg pubkey"
        executable: /bin/bash
      changed_when: true
      register: _awg_pub

    - name: Pick a random listen port and ASC integer params
      ansible.builtin.set_fact:
        _awg_port: "{{ range(awg_family_port_min, awg_family_port_max + 1) | random }}"
        _asc_jc: "{{ range(awg_family_asc_bounds.jc.min, awg_family_asc_bounds.jc.max + 1) | random }}"
        _asc_s1: "{{ range(awg_family_asc_bounds.s1.min, awg_family_asc_bounds.s1.max + 1) | random }}"
        _asc_s2: "{{ range(awg_family_asc_bounds.s2.min, awg_family_asc_bounds.s2.max + 1) | random }}"
        _asc_s3: "{{ range(awg_family_asc_bounds.s3.min, awg_family_asc_bounds.s3.max + 1) | random }}"
        _asc_s4: "{{ range(awg_family_asc_bounds.s4.min, awg_family_asc_bounds.s4.max + 1) | random }}"
        _asc_h1: "{{ range(awg_family_asc_bounds.h.min, awg_family_asc_bounds.h.max + 1) | random(seed=inventory_hostname ~ '-h1') }}"
        _asc_h2: "{{ range(awg_family_asc_bounds.h.min, awg_family_asc_bounds.h.max + 1) | random(seed=inventory_hostname ~ '-h2') }}"
        _asc_h3: "{{ range(awg_family_asc_bounds.h.min, awg_family_asc_bounds.h.max + 1) | random(seed=inventory_hostname ~ '-h3') }}"
        _asc_h4: "{{ range(awg_family_asc_bounds.h.min, awg_family_asc_bounds.h.max + 1) | random(seed=inventory_hostname ~ '-h4') }}"
        _asc_i1_bytes: "{{ range(awg_family_asc_bounds.i1.bytes_min, awg_family_asc_bounds.i1.bytes_max + 1) | random }}"

    - name: Fail loudly if H1..H4 collide (must be mutually distinct)
      ansible.builtin.assert:
        that:
          - "[_asc_h1, _asc_h2, _asc_h3, _asc_h4] | unique | length == 4"
        fail_msg: "H1..H4 ASC magics collided — re-run to regenerate"
        success_msg: "H1..H4 are mutually distinct"

    - name: Generate I1 junk-packet payload (random hex bytes)
      ansible.builtin.command: "openssl rand -hex {{ _asc_i1_bytes }}"
      changed_when: true
      register: _awg_i1_hex

    - name: Persist server secrets on control node (gitignored)
      ansible.builtin.copy:
        dest: "{{ awg_family_secrets_file }}"
        mode: '0600'
        content: |
          ---
          # Managed by de_family_awg — AmneziaWG server identity + shared ASC.
          # Generated once; gitignored. Delete this file to fully rotate the
          # server (then redeploy + re-issue every peer .conf).
          awg_family_port: {{ _awg_port }}
          awg_family_server_private_key: "{{ _awg_priv.stdout }}"
          awg_family_server_public_key: "{{ _awg_pub.stdout }}"
          awg_family_asc:
            jc: {{ _asc_jc }}
            jmin: {{ awg_family_jmin }}
            jmax: {{ awg_family_jmax }}
            s1: {{ _asc_s1 }}
            s2: {{ _asc_s2 }}
            s3: {{ _asc_s3 }}
            s4: {{ _asc_s4 }}
            h1: {{ _asc_h1 }}
            h2: {{ _asc_h2 }}
            h3: {{ _asc_h3 }}
            h4: {{ _asc_h4 }}
            i1: "<b 0x{{ _awg_i1_hex.stdout }}>"
      delegate_to: localhost
      become: false

# The server config (with [Peer] blocks) is rendered in peers.yml, after the
# per-peer keys exist — they're needed for the [Peer] PublicKey/PresharedKey.
- name: Load server secrets
  ansible.builtin.include_vars:
    file: "{{ awg_family_secrets_file }}"
