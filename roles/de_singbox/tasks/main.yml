---
# hy2-in uses the Let's Encrypt cert issued by de_ocserv (certbot). de_ocserv
# runs before de_singbox in site.yml, but a targeted run (--tags de_singbox) on
# a host that never issued the cert would otherwise fail opaquely at the
# "sing-box check" validate step. Assert it up front with an actionable message.
- name: Assert Let's Encrypt cert for hy2-in exists (issued by de_ocserv)
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ ocserv_domain }}/fullchain.pem"
  register: de_le_cert

- name: Fail early if the hy2-in TLS cert is missing
  ansible.builtin.assert:
    that: de_le_cert.stat.exists
    fail_msg: >-
      Нет LE-серта /etc/letsencrypt/live/{{ ocserv_domain }}/ для hy2-in.
      Его выпускает роль de_ocserv (certbot). Прогони сперва de_ocserv
      (или полный site.yml) — в site.yml de_ocserv идёт до de_singbox.

- name: Resolve sing-box package architecture
  ansible.builtin.set_fact:
    singbox_pkg_arch: "{{ singbox_arch_map[ansible_architecture] | default('amd64') }}"

- name: Download sing-box package
  ansible.builtin.get_url:
    url: "https://github.com/SagerNet/sing-box/releases/download/v{{ singbox_version }}/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    dest: "/tmp/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    mode: '0644'

- name: Install sing-box package
  ansible.builtin.apt:
    deb: "/tmp/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    state: present

- name: Ensure sing-box config directory exists
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy sing-box config for DE
  ansible.builtin.template:
    src: sing-box-de.json.j2
    dest: /etc/sing-box/config.json
    owner: root
    group: root
    mode: '0644'
    validate: '/usr/bin/sing-box check -c %s'
  notify: Restart sing-box

- name: Enable and start sing-box on DE
  ansible.builtin.systemd:
    name: sing-box
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for DE sing-box TCP listener
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ singbox_server_port }}"
    timeout: 20

- name: Flush handlers before next role runs
  ansible.builtin.meta: flush_handlers
