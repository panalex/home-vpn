---
# RU DNS over TLS — анти-спуфинг для заблокированных доменов.
# Plain UDP:53 РКН/ТСПУ подделывают на пути (instagram/facebook/discord),
# из-за чего desync-категория получала бы отравленный IP. DoT по IP шифрует
# ответ и не требует bootstrap-резолва. IP остаётся RU → CDN отдаёт ближний узел.
ru_dns_dot_ip:  "77.88.8.8"
ru_dns_dot_sni: "common.dot.dns.yandex.net"

# Watchdog вместо жёсткого kill-switch (для домашней сети — fail-open).
# При падении тоннеля sing-box жив → RU/zapret работают, геоблок-категория
# отваливается сама (app-level fail-closed, без утечки). Watchdog страхует лишь
# редкий краш самого процесса: cron раз в минуту поднимает sing-box обратно.
router_singbox_watchdog: true

# Geo rule-set'ы возим ЛОКАЛЬНЫМИ файлами (type: local), а не remote с
# download_detour: proxy. Иначе старт sing-box зависит от живого туннеля: при
# мёртвом proxy скачивание .srs таймаутит → FATAL → TUN не поднимается → ПОЛНАЯ
# утечка в RU + watchdog крутит crash-loop (ломает весь принцип fail-open).
# Файлы качаются на control node при деплое и заливаются на роутер; обновляются
# при каждом прогоне (geosite/geoip-ru меняются медленно — это приемлемо).
owrt_ruleset_dir: /etc/sing-box/rule-sets
owrt_rule_sets:
  - tag: geosite-ru
    url: "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-category-ru.srs"
  - tag: geoip-ru
    url: "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-ru.srs"
