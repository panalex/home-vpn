---
# owrt_singbox — sing-box TUN на роутере OpenWrt (GL-MT6000 / Flint 2).
# Leg home→edge: ручной переключатель router_primary_transport (по образцу
# de_uplink_transport на edge). hysteria2 (UDP/QUIC + obfs salamander) — primary;
# reality (VLESS+Reality+gRPC на :443, TCP) — whitelist/зарез-UDP страховка;
# shadowtls v3 (TCP) — fallback на случай, если ТСПУ срежет QUIC/UDP. edge всегда
# слушает все три inbound (hy2-in + vless-reality-in + shadowtls-in), переключение
# = смена переменной + редеплой только роутера (edge не трогаем).
- name: assert router transport is supported
  ansible.builtin.assert:
    that: router_primary_transport in ['hysteria2', 'reality', 'shadowtls']
    fail_msg: >-
      router_primary_transport должен быть 'hysteria2' (UDP/QUIC, primary),
      'reality' (VLESS+Reality+gRPC :443, whitelist/TCP) или 'shadowtls'
      (TCP-fallback). edge держит все три inbound (hy2-in + vless-reality-in +
      shadowtls-in); переключение = смена переменной + редеплой только роутера.

- name: gather openwrt facts
  community.openwrt.setup:

- name: packages
  community.openwrt.apk:
    name: "{{ item }}"
    state: present
  loop: [sing-box, kmod-tun]

# --- network: WAN dhcp, IPv6 off (чисто, без sysctl) ---
- community.openwrt.uci: { command: set, key: network.wan.proto, value: dhcp }
- community.openwrt.uci: { command: set, key: network.wan.ipv6,  value: '0' }
- community.openwrt.uci: { command: set, key: network.lan.delegate, value: '0' }
- community.openwrt.uci: { command: set, key: dhcp.lan.ra,       value: disabled }
- community.openwrt.uci: { command: set, key: dhcp.lan.dhcpv6,   value: disabled }

# --- sing-box uci-обёртка (то, из-за чего не стартовало) ---
- community.openwrt.uci: { command: set, key: sing-box.main.enabled, value: '1' }
- community.openwrt.uci: { command: set, key: sing-box.main.user,    value: root }
- community.openwrt.uci: { command: set, key: sing-box.main.conf,    value: /etc/sing-box/config.json }

# --- firewall: зона + forwarding ИДЕМПОТЕНТНО через section/find_by ---
- name: firewall zone proxy
  community.openwrt.uci:
    command: section
    config: firewall
    type: zone
    find_by: { name: proxy }
    value:
      name: proxy
      input: ACCEPT
      output: ACCEPT
      forward: ACCEPT
      mtu_fix: '1'
      device: ['singtun0']
- name: firewall forwarding lan->proxy
  community.openwrt.uci:
    command: section
    config: firewall
    type: forwarding
    find_by: { src: lan, dest: proxy }
    value: { src: lan, dest: proxy }

- name: commit uci
  community.openwrt.uci: { command: commit }
  notify: [reload network, reload firewall, restart sing-box]

# --- geo rule-set'ы: качаем на control node, заливаем на роутер как ЛОКАЛЬНЫЕ
#     файлы. Так старт sing-box не зависит от живого туннеля (см. defaults). ---
- name: download geo rule-sets on control node
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "/tmp/owrt-ruleset-{{ item.tag }}.srs"
    mode: '0644'
  loop: "{{ owrt_rule_sets }}"
  delegate_to: localhost
  run_once: true

- name: ensure rule-set dir on router
  community.openwrt.file:
    path: "{{ owrt_ruleset_dir }}"
    state: directory

- name: push geo rule-sets to router
  community.openwrt.copy:
    src: "/tmp/owrt-ruleset-{{ item.tag }}.srs"
    dest: "{{ owrt_ruleset_dir }}/{{ item.tag }}.srs"
    mode: '0644'
  loop: "{{ owrt_rule_sets }}"
  notify: restart sing-box

# --- rollback-guard: единая точка (пере)старта sing-box ---------------------
# Битый/невалидный config.json — единственный сценарий, из которого watchdog не
# вытащит (crash-loop), а вместе с sing-box ложится и канал управления (owrt_mgmt
# едет внутри тоннеля). Guard это закрывает: валидирует конфиг, стартует, и если
# процесс НЕ поднялся — откатывает на last-known-good (config.json.lkg) и
# рестартует. На каждом успешном старте LKG обновляется. Сюда же ходят handler
# "restart sing-box" и watchdog — поэтому откат работает и при деплое, и при крахе.
- name: install sing-box rollback-guard
  community.openwrt.copy:
    content: "{{ lookup('template', 'singbox-guard.j2') }}"
    dest: /usr/bin/singbox-guard
    mode: '0755'

# --- config.json: рендер шаблона на control node, валидация ДО подмены живого --
- name: resolve edge VPS IP
  set_fact:
    _edge_vps_ip: "{{ hostvars[groups['ru_vps'][0]]['ansible_host'] | default(groups['ru_vps'][0]) }}"

# Пишем в staging-файл и проверяем `sing-box check` ПРЕЖДЕ чем тронуть рабочий
# config.json — заведомо битый конфиг не должен ронять живой тоннель. Реальная
# подмена только после успешной проверки; промоут и рестарт — лишь при изменении.
- name: stage sing-box config
  community.openwrt.copy:
    content: "{{ lookup('template', 'config.json.j2') }}"
    dest: /etc/sing-box/config.json.new
    mode: '0600'
  register: _sb_cfg

- name: validate staged sing-box config
  community.openwrt.command:
    cmd: sing-box check -c /etc/sing-box/config.json.new
  changed_when: false

- name: promote sing-box config
  community.openwrt.command:
    cmd: /bin/sh -c "cp /etc/sing-box/config.json.new /etc/sing-box/config.json"
  when: _sb_cfg is changed
  notify: restart sing-box

# --- watchdog: автоперезапуск sing-box при падении процесса (fail-open) ---
# Мягкая страховка вместо жёсткого kill-switch: тоннель-down переживается сам
# (RU/zapret работают, геоблок отваливается без утечки), а краш процесса
# поднимается cron'ом раз в минуту.
- name: install sing-box watchdog script
  community.openwrt.copy:
    content: |
      #!/bin/sh
      # Managed by Ansible — процесс умер? Поднимаем через guard, чтобы битый
      # конфиг откатился на LKG, а не крутился в crash-loop.
      pidof sing-box >/dev/null 2>&1 || /usr/bin/singbox-guard
    dest: /usr/bin/singbox-watchdog
    mode: '0755'
  when: router_singbox_watchdog | bool

# community.openwrt.command exec'ит argv напрямую, без shell — поэтому пайпы,
# ||, { } и редиректы надо явно прогонять через /bin/sh -c. Заодно создаём
# /etc/crontabs/root: на свежем роутере файла ещё нет (busybox crond).
- name: install watchdog cron entry
  community.openwrt.command:
    cmd: >-
      /bin/sh -c "mkdir -p /etc/crontabs;
      grep -q singbox-watchdog /etc/crontabs/root 2>/dev/null ||
      { echo '* * * * * /usr/bin/singbox-watchdog' >> /etc/crontabs/root; echo CHANGED; }"
  register: _wd_cron
  changed_when: "'CHANGED' in _wd_cron.stdout"
  when: router_singbox_watchdog | bool
  notify: restart cron

- name: enable cron on boot
  community.openwrt.command: { cmd: /etc/init.d/cron enable }
  when: router_singbox_watchdog | bool
  changed_when: false
