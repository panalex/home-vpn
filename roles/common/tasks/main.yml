---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - golang-go
      - jq
      - nftables
      - tar
      - unzip
    state: present

- name: Disable IPv6 via sysctl
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    # - net.ipv4.tcp_congestion_control=bbr
    # - net.core.default_qdisc=fq
  when: common_disable_ipv6 | bool

- name: Load TCP BBR kernel module
  community.general.modprobe:
    name: tcp_bbr
    state: present

- name: Enable BBR congestion control
  ansible.posix.sysctl:
    name: net.ipv4.tcp_congestion_control
    value: bbr
    state: present
    reload: yes

- name: Set default_qdisc to fq
  sysctl:
    name: net.core.default_qdisc
    value: fq
    state: present
    ignoreerrors: yes

- name: Ensure nftables is enabled
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
