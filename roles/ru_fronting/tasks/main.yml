---
# ru_fronting now only ensures nginx is present and the stock default vhost is
# gone, so ru_letsencrypt can issue/renew the edge LE cert (/etc/letsencrypt/
# live/{{ domain }}/) over its :80 ACME webroot vhost. That cert backs the
# home→edge hy2-in inbound, so it must keep working.
#
# The old mtg active-probe fronting (self-signed cert, static stub site, the
# local 127.0.0.1:8443 TLS vhost and the ssl_preread SNI stream router) was
# removed together with the ru_mtg role — :443 on edge is now free for a future
# VLESS+Reality inbound.
- name: Install nginx and openssl
  ansible.builtin.apt:
    name:
      - nginx
      - openssl
    state: present
    update_cache: true

- name: Disable default nginx site if present
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
