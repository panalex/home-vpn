---
- name: Ensure mtg system user exists
  ansible.builtin.user:
    name: mtg
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/mtg
    create_home: false

- name: Ensure mtg directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/mtg', owner: 'root', group: 'root', mode: '0755' }
    - { path: '/var/lib/mtg', owner: 'mtg', group: 'mtg', mode: '0750' }

- name: Build and install mtg from source
  ansible.builtin.shell: |
    set -eu
    export GOBIN=/usr/local/bin
    export GOPROXY=direct
    /usr/bin/go install github.com/9seconds/mtg/v2@{{ mtg_version }}

# - name: Build and install mtg from source
#   ansible.builtin.shell: |
#     set -eu
#     export GOBIN=/usr/local/bin
#     /usr/bin/go install github.com/9seconds/mtg@{{ mtg_version }}
#   args:
#     creates: /usr/local/bin/mtg

- name: Check whether mtg secret file exists
  ansible.builtin.stat:
    path: /etc/mtg/secret
  register: mtg_secret_file_stat

- name: Generate mtg FakeTLS secret
  ansible.builtin.command: "/usr/local/bin/mtg generate-secret {{ domain }}"
  register: mtg_generated_secret
  changed_when: true
  when:
    - (mtg_secret_override | default('') | length) == 0
    - not mtg_secret_file_stat.stat.exists

- name: Persist generated mtg secret
  ansible.builtin.copy:
    content: "{{ mtg_generated_secret.stdout | trim }}\n"
    dest: /etc/mtg/secret
    owner: root
    group: root
    mode: '0600'
  when:
    - (mtg_secret_override | default('') | length) == 0
    - not mtg_secret_file_stat.stat.exists

- name: Read mtg secret file
  ansible.builtin.slurp:
    src: /etc/mtg/secret
  register: mtg_secret_file
  when: (mtg_secret_override | default('') | length) == 0

- name: Set effective mtg secret
  ansible.builtin.set_fact:
    mtg_secret_effective: >-
      {{
        (mtg_secret_override | default('') | length > 0)
        | ternary(mtg_secret_override, (mtg_secret_file.content | b64decode | trim))
      }}

- name: Deploy mtg configuration
  ansible.builtin.template:
    src: mtg.toml.j2
    dest: /etc/mtg/mtg.toml
    owner: root
    group: root
    mode: '0644'
  notify: Restart mtg

- name: Deploy mtg systemd unit
  ansible.builtin.template:
    src: mtg.service.j2
    dest: /etc/systemd/system/mtg.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart mtg

- name: Enable and start mtg
  ansible.builtin.systemd:
    name: mtg
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for mtg TCP listener
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ mtg_bind_port }}"
    timeout: 20
  failed_when: false
