---
- name: Resolve sing-box package architecture
  ansible.builtin.set_fact:
    singbox_pkg_arch: "{{ singbox_arch_map[ansible_facts['architecture']] | default('amd64') }}"

- name: Download sing-box package
  ansible.builtin.get_url:
    url: "https://github.com/SagerNet/sing-box/releases/download/v{{ singbox_version }}/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    dest: "/tmp/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    mode: '0644'

- name: Install sing-box package
  ansible.builtin.apt:
    deb: "/tmp/sing-box_{{ singbox_version }}_linux_{{ singbox_pkg_arch }}.deb"
    state: present

- name: Ensure sing-box config directory exists
  ansible.builtin.file:
    path: /etc/sing-box
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy sing-box config for RU
  ansible.builtin.template:
    src: sing-box-ru.json.j2
    dest: /etc/sing-box/config.json
    owner: root
    group: root
    mode: '0755'
    validate: '/usr/bin/sing-box check -c %s'
  notify: Restart sing-box

# sing-box (root) читает LE cert/key напрямую из /etc/letsencrypt/live; hysteria2
# и shadowtls грузят серт ОДИН раз при старте и сами не следят за его обновлением.
# certbot.timer обновляет серт молча — без рестарта sing-box продолжил бы отдавать
# старый. Drop-in deploy-hook рестартит sing-box при обновлении именно edge-домена
# (RENEWED_LINEAGE), по аналогии с deploy-hook nginx у ru_letsencrypt.
- name: Ensure certbot deploy-hook directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install sing-box cert-renew deploy hook
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-sing-box.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/sh
      # Managed by Ansible (ru_singbox): перезапустить sing-box, чтобы hysteria2/
      # shadowtls подхватили обновлённый LE-серт edge-домена.
      case "$RENEWED_LINEAGE" in
        */{{ domain }}) systemctl restart sing-box ;;
      esac

- name: Enable and start sing-box on RU
  ansible.builtin.systemd:
    name: sing-box
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for local RU SOCKS listener
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ ru_singbox_socks_port }}"
    timeout: 20

