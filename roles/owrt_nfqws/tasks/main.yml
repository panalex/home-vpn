---
# === 1. NFQUEUE kernel module ===
# On GL-MT6000 the module is typically built into the kernel; only install if missing.
- name: check if nfnetlink_queue module is available
  community.openwrt.command:
    cmd: >-
      grep -qw nfnetlink_queue /proc/modules ||
      grep -qw nfnetlink_queue /lib/modules/$(uname -r)/modules.builtin 2>/dev/null ||
      modprobe nfnetlink_queue 2>/dev/null
  register: _nfq_check
  changed_when: false
  failed_when: false

- name: install kmod-nfnetlink-queue
  community.openwrt.apk:
    name: kmod-nfnetlink-queue
    state: present
  when: _nfq_check.rc != 0

# === 1b. nftables NFQUEUE *expression* module ===
# kmod-nft-queue даёт выражение `queue num` в самом nftables — это ОТДЕЛЬНЫЙ модуль
# от nfnetlink_queue (которым к очереди цепляется nfqws). Без него правило
# `... tcp dport {80,443} queue num N` молча НЕ загружается при reload firewall:
# соседнее `... udp ... drop` грузится, а queue-строка отваливается. Симптом —
# трафик метится mark=100 и уходит мимо nfqws напрямую (DPI режет, десинк не применяется).
- name: check if nft_queue module is available
  community.openwrt.command:
    cmd: >-
      grep -qw nft_queue /proc/modules ||
      grep -qw nft_queue /lib/modules/$(uname -r)/modules.builtin 2>/dev/null ||
      modprobe nft_queue 2>/dev/null
  register: _nft_queue_check
  changed_when: false
  failed_when: false

- name: install kmod-nft-queue
  community.openwrt.apk:
    name: kmod-nft-queue
    state: present
  when: _nft_queue_check.rc != 0
  notify: reload firewall

# === 2. Disable MediaTek flow offload (SW + HW) ===
# Flow offloading шунтирует netfilter: offload-нутые соединения минуют NFQUEUE,
# а raw-пакеты, которые инжектит nfqws, получают EPERM
# ("rawsend: sendto: Operation not permitted"). Для работы nfqws ОБЕ разновидности
# offload должны быть выключены — программный offload тоже ломает десинк, не только HW.
- name: disable software flow offloading
  community.openwrt.uci:
    command: set
    key: firewall.@defaults[0].flow_offloading
    value: '0'
  register: _offload_sw_change

- name: disable hw flow offloading
  community.openwrt.uci:
    command: set
    key: firewall.@defaults[0].flow_offloading_hw
    value: '0'
  when: owrt_disable_hw_offload | bool
  register: _offload_hw_change

- name: commit firewall uci
  community.openwrt.uci:
    command: commit
    config: firewall
  when: _offload_sw_change is changed or _offload_hw_change is changed
  notify: reload firewall

# === 3. Install nfqws binary ===
- name: check installed nfqws version
  community.openwrt.command:
    cmd: "cat /usr/sbin/nfqws.version"
  register: _nfqws_ver
  changed_when: false
  failed_when: false

- name: download and install nfqws
  when: _nfqws_ver.stdout | trim != nfqws_version
  block:
    - name: download zapret archive
      community.openwrt.command:
        cmd: >-
          wget -q -O /tmp/zapret.tar.gz
          https://github.com/bol-van/zapret/releases/download/v{{ nfqws_version }}/zapret-v{{ nfqws_version }}.tar.gz

    - name: extract nfqws binary
      community.openwrt.command:
        cmd: >-
          tar -xzf /tmp/zapret.tar.gz -C /tmp
          zapret-v{{ nfqws_version }}/binaries/linux-arm64/nfqws

    - name: install nfqws to /usr/sbin
      community.openwrt.command:
        cmd: cp /tmp/zapret-v{{ nfqws_version }}/binaries/linux-arm64/nfqws /usr/sbin/nfqws

    - name: set nfqws executable bit
      community.openwrt.command:
        cmd: chmod 755 /usr/sbin/nfqws

    - name: cleanup download
      community.openwrt.command:
        cmd: "rm -f /tmp/zapret.tar.gz; rm -rf /tmp/zapret-v{{ nfqws_version }}"

    - name: write version marker
      community.openwrt.copy:
        content: "{{ nfqws_version }}"
        dest: /usr/sbin/nfqws.version
      notify: restart nfqws

# === 4. procd init script ===
- name: install nfqws init script
  community.openwrt.copy:
    content: "{{ lookup('template', 'nfqws.init.j2') }}"
    dest: /etc/init.d/nfqws
    mode: '0755'
  notify: restart nfqws

- name: enable nfqws on boot
  community.openwrt.command:
    cmd: /etc/init.d/nfqws enable
  changed_when: false

# === 5. nftables NFQUEUE rules (firewall include) ===
- name: install dpi-bypass firewall script
  community.openwrt.copy:
    content: "{{ lookup('template', 'dpi-bypass.sh.j2') }}"
    dest: /etc/nftables.d/99-dpi-bypass.sh
    mode: '0755'
  notify: reload firewall

- name: register dpi-bypass as firewall include
  community.openwrt.uci:
    command: section
    config: firewall
    type: include
    find_by: { path: /etc/nftables.d/99-dpi-bypass.sh }
    value:
      path: /etc/nftables.d/99-dpi-bypass.sh
      enabled: '1'
  notify: reload firewall

- name: commit firewall include uci
  community.openwrt.uci:
    command: commit
    config: firewall
