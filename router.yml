- hosts: routers
  gather_facts: false
  roles:
    - role: community.openwrt.init
      tags: [owrt_init]
    # Загружает VLESS+Reality материал (secrets/reality.yml) ДО owrt_singbox —
    # роутерному outbound нужны reality_public_key/short_id/uuid при
    # router_primary_transport=reality. Генерация делегируется на edge (ru_vps).
    - role: reality_keys
      tags: [reality_keys, owrt_singbox, singbox]
    - role: owrt_singbox
      tags: [owrt_singbox, singbox]
    - role: owrt_nfqws
      tags: [owrt_nfqws, nfqws]
    - role: owrt_mgmt
      tags: [owrt_mgmt, mgmt]
