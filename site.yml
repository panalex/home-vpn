---
- name: Base preparation on all hosts
  hosts: [ru_vps, de_vps]
  become: true
  roles:
    - role: common
      tags: [common]

- name: Configure DE egress gateway and VPN
  hosts: de_vps
  become: true
  roles:
    - role: de_unbound
      tags: [de_unbound, de, dns]
    # de_ocserv runs BEFORE de_singbox: it issues the Let's Encrypt cert for
    # ocserv_domain (certbot --standalone), which de_singbox's hy2-in inbound
    # now references for TLS. On a fresh host the cert must exist before
    # sing-box starts, or the service fails to come up.
    - role: de_ocserv
      tags: [de_ocserv, de, ocserv, vpn]
    - role: de_singbox
      tags: [de_singbox, de, singbox]
    - role: de_wdtt
      tags: [de_wdtt, de, wdtt]
    - role: de_mgmt
      tags: [de_mgmt, de, mgmt]
    - role: firewall
      tags: [firewall, de]

- name: Configure RU ingress and relay node
  hosts: ru_vps
  become: true
  roles:
    - role: ru_fronting
      tags: [ru_fronting, ru, web]
    - role: ru_letsencrypt
      tags: [ru_letsencrypt, ru, web, letsencrypt]
    - role: ru_singbox
      tags: [ru_singbox, ru, singbox]
    - role: ru_mtg
      tags: [ru_mtg, ru, telegram]
    - role: ru_tgproxy
      tags: [ru_tgproxy, ru, tgproxy]
    - role: firewall
      tags: [firewall, ru]

- name: Sync users (proxy + VPN)
  hosts: de_vps
  become: true
  vars:
    users: "{{ vpn_users | default([]) }}"
  roles:
    - role: users
      tags: [users]
