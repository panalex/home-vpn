---
- name: Base preparation on all hosts
  hosts: [ru_vps, de_vps]
  become: true
  roles:
    - role: common
      tags: [common]

- name: Configure DE egress gateway and VPN
  hosts: de_vps
  become: true
  roles:
    - role: de_unbound
      tags: [de_unbound, de, dns]
    # de_ocserv still owns the Let's Encrypt cert for ocserv_domain (certbot
    # --standalone), used by ocserv itself. de_singbox no longer references it
    # (the edge→DE uplink collapsed to shadowtls + legacy ss-in, neither needs a
    # local cert), so the ordering is no longer a hard dependency — kept as-is
    # since ocserv is the cert owner and nothing benefits from reordering.
    - role: de_ocserv
      tags: [de_ocserv, de, ocserv, vpn]
    - role: de_singbox
      tags: [de_singbox, de, singbox]
    - role: de_wdtt
      tags: [de_wdtt, de, wdtt]
    - role: de_mgmt
      tags: [de_mgmt, de, mgmt]
    - role: firewall
      tags: [firewall, de]

- name: Configure RU ingress and relay node
  hosts: ru_vps
  become: true
  roles:
    - role: ru_fronting
      tags: [ru_fronting, ru, web]
    - role: ru_letsencrypt
      tags: [ru_letsencrypt, ru, web, letsencrypt]
    # Генерит/загружает VLESS+Reality материал (secrets/reality.yml) ДО ru_singbox,
    # которому нужен reality_private_key для inbound vless-reality-in на :443.
    - role: reality_keys
      tags: [reality_keys, ru_singbox, ru, singbox]
    - role: ru_singbox
      tags: [ru_singbox, ru, singbox]
    - role: firewall
      tags: [firewall, ru]

- name: Sync users (proxy + VPN)
  hosts: de_vps
  become: true
  vars:
    users: "{{ vpn_users | default([]) }}"
  roles:
    - role: users
      tags: [users]
